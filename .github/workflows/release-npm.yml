name: Release NPM

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get latest tag and bump version
        id: bump
        run: |
          PREFIX="v"
          BUMP="${{ inputs.bump }}"
          latest=$(git tag --sort=-v:refname --list "${PREFIX}*" | head -n 1)
          if [ -z "$latest" ]; then
            new="0.1.0"
          else
            version="${latest#${PREFIX}}"
            IFS='.' read -r major minor patch <<< "$version"
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            new="${major}.${minor}.${patch}"
          fi
          echo "version=${new}" >> "$GITHUB_OUTPUT"
          echo "tag=${PREFIX}${new}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest:-none} → ${PREFIX}${new} (${BUMP})"

      - name: Bump version in package.json
        run: |
          npm version "${{ steps.bump.outputs.version }}" --no-git-tag-version --allow-same-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet && echo "No version change" || (git commit -m "Bump version to ${{ steps.bump.outputs.version }}" && git push)

      - run: bun install --frozen-lockfile --ignore-scripts

      - run: bun run typecheck

      - run: bun pm pack

      - name: Create release with tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" *.tgz --generate-notes --title "v${{ steps.bump.outputs.version }}"

      - name: Publish to npm
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
