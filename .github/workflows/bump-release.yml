name: Bump, Release & Publish

on:
  workflow_dispatch:

jobs:
  bump-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get latest tag and bump patch
        id: bump
        run: |
          latest=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$latest" ]; then
            new="0.1.0"
          else
            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            new="${major}.${minor}.${patch}"
          fi
          echo "tag=${new}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest:-none} → ${new}"

      - name: Bump version in package.json
        run: |
          npm version "${{ steps.bump.outputs.tag }}" --no-git-tag-version --allow-same-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet && echo "No version change" || (git commit -m "Bump version to ${{ steps.bump.outputs.tag }}" && git push)

      - run: bun install --frozen-lockfile --ignore-scripts

      - run: bun run typecheck

      - run: bun pm pack

      - name: Create release with tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" *.tgz --generate-notes --title "v${{ steps.bump.outputs.tag }}"

      - name: Publish to npm
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
