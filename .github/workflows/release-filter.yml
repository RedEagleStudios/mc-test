name: Release Filter

on:
  workflow_dispatch:

jobs:
  release-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump patch
        id: bump
        run: |
          PREFIX="mc_test-"
          latest=$(git tag --sort=-v:refname --list "${PREFIX}*" | head -n 1)
          if [ -z "$latest" ]; then
            new="0.1.0"
          else
            version="${latest#${PREFIX}}"
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            new="${major}.${minor}.${patch}"
          fi
          echo "version=${new}" >> "$GITHUB_OUTPUT"
          echo "tag=${PREFIX}${new}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest:-none} → ${PREFIX}${new}"

      - name: Bump version in mc_test/package.json
        run: |
          cd mc_test
          npm version "${{ steps.bump.outputs.version }}" --no-git-tag-version --allow-same-version
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mc_test/package.json
          git diff --cached --quiet && echo "No version change" || (git commit -m "Bump filter version to ${{ steps.bump.outputs.version }}" && git push)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" --generate-notes --title "Filter ${{ steps.bump.outputs.version }}"
